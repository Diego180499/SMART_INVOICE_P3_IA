services:
  mysql:
    image: mysql:8.0
    container_name: smartinvoice_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-smart_invoice}
      MYSQL_USER: ${DB_USER:-smart_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-smart_pass_123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  backend:
    build: .
    container_name: smartinvoice_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-smart_invoice}
      DB_USER: ${DB_USER:-smart_user}
      DB_PASSWORD: ${DB_PASSWORD:-smart_pass_123}
      SECRET_KEY: ${SECRET_KEY:-cambia_esta_clave_secreta}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      OCR_LANG: spa+eng
      # El .env queda excluido por .dockerignore; por eso definimos aqui el origen
      # del frontend (puerto 8080) para que el CORS del backend lo acepte.
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000,http://localhost:5173}"
      # URL del formulario simulado, alcanzable por el NOMBRE DE SERVICIO dentro de
      # la red de Docker (no 'localhost', que apuntaria al propio contenedor backend).
      # Valor LITERAL a proposito: el .env del backend define RPA_FORM_URL con
      # localhost (correcto para correr el backend fuera de Docker), pero dentro
      # de la red de Docker debe ser el nombre de servicio del formulario.
      RPA_FORM_URL: "http://rpa_form:3000/formulario-simulado"
      RPA_HEADLESS: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports

  frontend:
    # Interfaz web (Nginx con el SPA). Contexto de build: carpeta hermana.
    build: ../smart_invoice_frontend
    container_name: smartinvoice_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # URL del backend usada por el NAVEGADOR; apunta al host publicado
      # (localhost:8000), no al nombre interno del servicio. Se inyecta en env.js.
      API_URL: "${API_URL:-http://localhost:8000}"
    ports:
      - "8080:80"

  rpa_form:
    # Formulario web simulado (sistema externo) al que el RPA ingresa los datos.
    build: ../smart_invoice_rpa_form
    container_name: smartinvoice_rpa_form
    restart: unless-stopped
    ports:
      - "3000:3000"        # http://localhost:3000  (para ver los registros recibidos)
    volumes:
      - rpa_form_data:/data

volumes:
  mysql_data:
  rpa_form_data:
