<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartInvoice</title>
  <meta name="description" content="SmartInvoice — Procesamiento inteligente de facturas con OCR, validación, reportes y RPA." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23588157'/%3E%3Cpath d='M9 8h11l3 3v13H9z' fill='%23DAD7CD'/%3E%3Cpath d='M12 14h8M12 17h8M12 20h5' stroke='%233A5A40' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Pantalla de autenticación (login / registro) -->
  <div id="auth-screen" class="auth-screen hidden"></div>

  <!-- Aplicación principal (layout con sidebar) -->
  <div id="app-shell" class="app-shell hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <span class="brand__logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="30" height="30"><rect width="32" height="32" rx="7" fill="#588157"/><path d="M9 8h11l3 3v13H9z" fill="#DAD7CD"/><path d="M12 14h8M12 17h8M12 20h5" stroke="#3A5A40" stroke-width="1.6" stroke-linecap="round"/></svg>
        </span>
        <span class="brand__name">Smart<strong>Invoice</strong></span>
      </div>
      <nav class="sidebar__nav" id="main-nav"></nav>
      <div class="sidebar__footer">
        <div class="user-chip" id="user-chip"></div>
        <button class="btn btn--ghost btn--block" id="logout-btn">Cerrar sesión</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="icon-btn" id="sidebar-toggle" aria-label="Menú">&#9776;</button>
        <h1 class="topbar__title" id="view-title">Dashboard</h1>
        <div class="topbar__actions">
          <span class="api-badge" id="api-badge" title="URL del backend"></span>
        </div>
      </header>
      <main class="view" id="view-root"></main>
    </div>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  </div>

  <!-- Contenedores globales -->
  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>
  <div id="modal-root"></div>
  <div id="loading-overlay" class="loading-overlay hidden"><div class="spinner"></div></div>

  <!-- Chart.js (gráficas del dashboard) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>

  <!-- Configuración de entorno (inyectada en despliegue; define window.__SMARTINVOICE_API__) -->
  <script src="env.js" defer></script>

  <!-- Núcleo -->
  <script src="js/config.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/router.js" defer></script>

  <!-- Vistas -->
  <script src="js/views/login.js" defer></script>
  <script src="js/views/dashboard.js" defer></script>
  <script src="js/views/proveedores.js" defer></script>
  <script src="js/views/facturas.js" defer></script>
  <script src="js/views/factura-detalle.js" defer></script>
  <script src="js/views/bitacora.js" defer></script>
  <script src="js/views/reportes.js" defer></script>
  <script src="js/views/rpa.js" defer></script>
  <script src="js/views/perfil.js" defer></script>

  <!-- Arranque -->
  <script src="js/app.js" defer></script>
</body>
</html>
