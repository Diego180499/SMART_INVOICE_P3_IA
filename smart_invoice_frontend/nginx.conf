server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Compresión
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache de estáticos (no para index.html ni env.js)
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /index.html { add_header Cache-Control "no-store"; }
    location = /env.js     { add_header Cache-Control "no-store"; }

    # SPA: cualquier ruta cae a index.html (el router usa hash, pero esto cubre F5)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ──────────────────────────────────────────────────────────────
    # Proxy opcional al backend.
    # Si prefieres servir API y frontend bajo el mismo dominio, descomenta
    # este bloque y define en env.js:  window.__SMARTINVOICE_API__ = "";
    # (con base vacía el frontend llamará a /api/v1 en el mismo host).
    # ──────────────────────────────────────────────────────────────
    # location /api/ {
    #     proxy_pass         http://backend:8000;
    #     proxy_set_header   Host $host;
    #     proxy_set_header   X-Real-IP $remote_addr;
    #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    #     client_max_body_size 25m;
    # }
}
